<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="style_payment.css">
</head>
<body>
    <div class="container">

        <div class="detail">
            <div class="detail-film">
                <div class="card">
                    <img src="BeWithYou.jpg" alt="Be With You" class="film-poster">
                </div>
                    <div class="keterangan">
                    <div class="nama-bioskop"><span>Zodiac</span>Cinemas</div>
                    <div class="judul-film">Be With You</div>
                    <div class="rate">⭐ 8.0</div>
                    <div class="studio">Studio 1</div>
                    <div class="tanggal">Jumat, 10 April 2026</div>
                </div>
            </div>
        </div>

        <div class="transaksi">
            <div class="detail-transaksi">
                <h3>Detail Transaksi</h3>
                <div class="info-tiket">
                    <div class="baris-transaksi">
                        <div class="label">TIKET</div>
                        <div class="isi">No. Seat</div>
                    </div>
                    <div class="baris-transaksi">
                        <div class="label">Kursi</div>
                        <div class="isi">Rp0</div>
                    </div>

                    <hr class="line">
                </div>
            </div>

            <div class="payment">Metode Pembayaran</div>

            <div class="metode-pembayaran">
                <div class="qris"><img src="icon_payment/qris-putih.svg" alt="QRIS">QRIS</div>
                <div class="tunai"><img src="icon_payment/tunai.png" alt="Tunai">Tunai</div>
                <div class="debit"><img src="icon_payment/debit2.jpg" alt="Debit">Debit</div>
            </div>

            <div class="payment-container">
                <div class="checkout-box">
                    <div class="baris-transaksi">
                        <div class="label">TOTAL BAYAR</div>
                        <div class="isi-total">Rp 0</div>
                    </div>

                    <div class="finish">SELESAIKAN PEMBAYARAN</div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
