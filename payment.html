<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="style/style_payment.css">
</head>
<body>

    <div class="navbar">
        <a href="about.html" class="back">Back</a>
        <div class="zodiac"><span>Zodiac</span>  cinemas</div>
    </div>

    <div class="container">

        <div class="kiri">
                <div class="card">
                    <img src="Film/BeWithYou.jpg" alt="Be With You" class="film-poster">
                </div>
            <div class="info-film">
                <div class="nama-bioskop"><span>Zodiac</span> cinemas</div>
                <div class="judul-film">Be With You</div>
                <div class="rate">⭐ 8.0</div>
                <div class="studio">Studio 1</div>
                <div class="tanggal">Jumat, 10 April 2026</div>
            </div>
        </div>

        <div class="kanan">
            <div class="detail-transaksi">Detail Transaksi</div>

            <div class="info-row">
                <div class="label">KURSI</div>
                <div class="seat">A1, A2</div>
            </div>

            <div class="info-row">
                <div class="label">2 TIKET</div>
                <div class="seat harga">Rp100.000 <span>x 2</span></div>
            </div>

            <div class="payment">Metode Pembayaran</div>

            <div class="line"></div>

            <div class="metode-payment">
                <button class="metode-button" onclick="pilihMetode(this)">
                    <div class="metode-icon dana"><img src="icon_payment/dana.jpg" alt=""></div>
                    DANA
                </button>

                <button class="metode-button" onclick="pilihMetode(this)">
                    <div class="metode-icon tunai"><img src="icon_payment/tunai.png" alt=""></div>
                    Tunai
                </button>

                <button class="metode-button" onclick="pilihMetode(this)">
                    <div class="metode-icon debit"><img src="icon_payment/debit2.jpg" alt=""></div>
                    Debit
                </button>
            </div>

            <div class="garis"></div>

                <div class="total">
                    <div class="label-total">TOTAL BAYAR</div>
                    <div class="label-harga">Rp200.000</div>
                </div>

                <a href="tiket.html" class="finish">SELESAIKAN PEMBAYARAN</a>
        </div>
    </div>

    <script>
        function pilihMetode(el) {
            if (el.classList.contains('active')) {
                el.classList.remove('active');
            } else {
                document.querySelectorAll('.metode-button').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }
    </script>
</body>
</html>
