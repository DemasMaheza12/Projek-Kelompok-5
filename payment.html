<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac Cinemas - Pembayaran</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🪐</text></svg>">
    <link rel="stylesheet" href="style/style_payment.css">
</head>
<body>
    <div class="cinema-app">
        <header>
            <a href="seat.html"><button class="btn-back">Kembali</button></a>
            <div class="zodiac"><span>Zodiac</span> cinemas</div>
        </header>

        <main class="payment-container">
            <div class="movie-info-pane">
                <img src="img/bwy.jpg" alt="Poster Film" id="pay-poster" class="poster-img">
                <div class="movie-desc">
                    <p class="brand-text"><span>Zodiac</span> cinemas</p>
                    <h2 id="pay-movie-title">JUDUL FILM</h2>
                    <p class="studio-text">STUDIO 1, PONDOK LABU</p>
                    <p class="time-text" id="pay-time">Jam Tayang</p>
                </div>
            </div>

            <div class="transaction-pane">
                <h3>Detail Transaksi</h3>
                
                <div class="detail-row">
                    <span id="pay-ticket-count">0 TIKET</span>
                    <span id="pay-seats" class="kursi">Kursi: -</span>
                </div>
                <div class="detail-row harga-row">
                    <span>KURSI</span>
                    <span id="pay-subtotal" class="harga">Rp 0 x 0</span>
                </div>

                <div class="divider"></div>

                <h4 class="method-title">Metode Pembayaran</h4>
                <div class="payment-methods">
                    <button class="btn-method">
                        <img src="icon_payment/dana.jpg" alt="Dana">Dana
                    </button>
                    <button class="btn-method">
                        <img src="icon_payment/tunai.png" alt="Tunai">Tunai
                    </button>
                    <button class="btn-method">
                        <img src="icon_payment/debit2.jpg" alt="">Debit
                    </button>
                </div>

                <div class="total-row">
                    <span>TOTAL BAYAR</span>
                    <h2 id="pay-total-price">Rp 0</h2>
                </div>

                <button id="btn-pay" class="btn-pay-submit">SELESAIKAN PEMBAYARAN</button>
            </div>
        </main>

        <div id="queue-overlay" class="hidden">
            <h2>Memproses Antrean Sistem...</h2>
            <div id="visual-queue"></div>
            <p id="queue-status-text">Menunggu antrean...</p>
        </div>
    </div>

    <script src="script/wasm_payment.js"></script>
    <script src="script/payment.js"></script>
</body>
</html>
