<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac Cinemas - Pilih Kursi</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🪐</text></svg>">
    <link rel="stylesheet" href="style/seat.css">
</head>
<body>
    <div class="cinema-app">
        <header class="top">
            <a href="index.html"><button class="btn-back">Kembali</button></a>
            <div class="zodiac"><span>Zodiac</span> cinemas</div>
        </header>

        <main>
            <div class="booking-container">
                <div class="seat-area">
                    <div class="seat-header">
                        <h2>PILIH SEAT</h2>
                        <div class="legend">
                            <div class="legend-item"><span class="box tersedia"></span> Tersedia</div>
                            <div class="legend-item"><span class="box dipesan"></span> Sudah Dipesan</div>
                            <div class="legend-item"><span class="box dipilih"></span> Dipilih</div>
                        </div>
                    </div>

                    <div class="seat-map" id="seat-map">
                        <div class="row">
                            <div class="seat-block">
                                <button class="seat">A1</button>
                                <button class="seat">A2</button>
                            </div>
                            <div class="seat-block">
                                <button class="seat">A3</button>
                                <button class="seat">A4</button>
                                <button class="seat">A5</button>
                                <button class="seat">A6</button>
                                <button class="seat">A7</button>
                                <button class="seat">A8</button>
                            </div>
                            <div class="seat-block">
                                <button class="seat">A9</button>
                                <button class="seat">A10</button>
                            </div>
                        </div>
                        <div class="row">
                            <div class="seat-block"><button class="seat">B1</button><button class="seat">B2</button></div>
                            <div class="seat-block">
                                <button class="seat">B3</button><button class="seat">B4</button><button class="seat">B5</button>
                                <button class="seat">B6</button><button class="seat">B7</button><button class="seat">B8</button>
                            </div>
                            <div class="seat-block"><button class="seat">B9</button><button class="seat">B10</button></div>
                        </div>
                        <div class="row">
                            <div class="seat-block"><button class="seat">C1</button><button class="seat">C2</button></div>
                            <div class="seat-block">
                                <button class="seat">C3</button><button class="seat">C4</button><button class="seat">C5</button>
                                <button class="seat">C6</button><button class="seat">C7</button><button class="seat">C8</button>
                            </div>
                            <div class="seat-block"><button class="seat">C9</button><button class="seat">C10</button></div>
                        </div>
                        <div class="row">
                            <div class="seat-block"><button class="seat">D1</button><button class="seat">D2</button></div>
                            <div class="seat-block">
                                <button class="seat">D3</button><button class="seat">D4</button><button class="seat">D5</button>
                                <button class="seat">D6</button><button class="seat">D7</button><button class="seat">D8</button>
                            </div>
                            <div class="seat-block"><button class="seat">D9</button><button class="seat">D10</button></div>
                        </div>
                    </div>

                    <div class="screen-container">
                        <div class="screen-curve"></div>
                        <p>Layar Bioskop</p>
                    </div>
                </div>

                <div class="sidebar-info">
                    <div class="info-cards-wrapper">
                        <div class="info-card kotak">
                            <p class="info-label">Total harga</p>
                            <h3 class="info-price" id="total-harga">-</h3>
                        </div>
                        <div class="info-card kotak">
                            <p class="info-label">Tempat duduk</p>
                            <div class="selected-seats-list" id="selected-seats-list"></div>
                        </div>
                    </div>

                    <div class="ringkasan">
                        <a href="payment.html" style="text-decoration: none;">
                            <button class="btn-summary" id="btn-summary">RINGKASAN ORDER(0)</button>
                        </a>
                        
                        <button id="btn-undo" class="btn-undo-style">Batal Pilih (UNDO)</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script/wasm_seat.js"></script>
    <script src="script/seat.js"></script>
</body>
</html>
